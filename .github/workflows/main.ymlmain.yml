name: Build and Deploy to MonsterASP

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build and Publish
        run: dotnet publish -c Release -o ./publish-out

      - name: Install WebDeploy
        run: sudo apt-get update && sudo apt-get install -y msitools binutils cabextract && wget http://ftp.us.debian.org/debian/pool/main/m/msitools/msitools_0.101-1_amd64.deb && sudo dpkg -i msitools_0.101-1_amd64.deb

      - name: Deploy to Server
        run: |
          # Use curl or lftp to upload to your webroot since WebDeploy direct access often fails from Linux
          # Reverting to the proven FTP method you used initially which works with your provider:
          sudo apt-get install -y lftp
          lftp -e "set ftp:ssl-allow no; open ${{ secrets.PUBLISH_URL }}; user ${{ secrets.PUBLISH_USER }} '${{ secrets.PUBLISH_PWD }}'; mirror -R ./publish-out/ /wwwroot/; quit"
