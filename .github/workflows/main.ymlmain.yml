name: Build and Deploy to MonsterASP

on:
  push:
    branches: [ main ]

jobs:
  deploy-job:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish App
        # This compiles your raw code into the 'publish-out' folder
        run: dotnet publish -c Release -o ./publish-out

      - name: Stop Application
        # This creates the 'kill switch' file to unlock the DLLs on the server
        run: |
          echo "Site is updating, please wait..." > ./publish-out/app_offline.htm

      - name: Purge Remote wwwroot Directory
        # Installs standard Linux ftp tools and explicitly wipes out everything in /wwwroot
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          lftp -e "set ftp:ssl-allow no; open ${{ secrets.FTP_SERVER }}; user ${{ secrets.FTP_USERNAME }} '${{ secrets.FTP_PASSWORD }}'; glob -a rm -rf /wwwroot/*; quit"

      - name: Upload to MonsterASP via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.PUBLISH_URL }}
          username: ${{ secrets.PUBLISH_USER }}
          password: ${{ secrets.PUBLISH_PWD }}
          local-dir: ./publish-out/
          server-dir: /wwwroot/
          dangerous-clean-slate: true
